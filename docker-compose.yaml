services:
  text-encoder:
    build:
      context: .
      dockerfile: Dockerfile
    image: kimodo:1.0
    container_name: text-encoder
    working_dir: /workspace
    command: python -m kimodo.scripts.run_text_encoder_server
    volumes:
      - ./:/workspace
      # Cache HF downloads in host "system-wide" Hugging Face cache.
      - ${HOME}/.cache/huggingface:/workspace/.cache/huggingface
      # Mount the host HF auth token at the standard cache location in-container.
      - ${HOME}/.cache/huggingface/token:/workspace/.cache/huggingface/token:ro
    # expose to your host browser
    ports:
      - "9550:9550"
    environment:
      # Make Gradio reachable from other containers
      # - GRADIO_SERVER_NAME=0.0.0.0
      # - GRADIO_SERVER_PORT=9550
      - HF_HOME=/workspace/.cache/huggingface
      # Host user mapping (for non-root ownership + proper shell prompt)
      - HOST_USER=${USER:-user}

      # Text encoder on GPU: encoding on CPU was the generation bottleneck
      # (~40s/prompt). The diffusion model is small (~4GB of 24GB used), so there's
      # ample VRAM headroom for both. Revert to cpu if VRAM ever gets tight.
      - TEXT_ENCODER_DEVICE=cuda

      # GPU
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    shm_size: "16gb"
    ipc: host

    # Wait until Gradio responds on HTTP
    healthcheck:
      test:
        ["CMD", "bash", "-lc", "curl -fsS http://localhost:9550/ > /dev/null"]
      interval: 3s
      timeout: 2s
      retries: 40

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: kimodo:1.0
    container_name: demo
    working_dir: /workspace
    # Motion API is the canonical service consumed by external frontends
    # (woid). The gradio demo (`python -m kimodo.demo`) can still be
    # launched on demand via `docker exec demo python -m kimodo.demo`,
    # but it loads the diffusion model into VRAM and competes with the
    # motion API on a 24 GiB card, so we don't run it by default.
    command: python -m kimodo.scripts.run_motion_api
    volumes:
      - ./:/workspace
      - ${HOME}/.cache/huggingface:/workspace/.cache/huggingface
      - ${HOME}/.cache/huggingface/token:/workspace/.cache/huggingface/token:ro
      # Explicit checkpoint mount (avoids surprises if the repo bind mount isn't what you expect).
      - ./checkpoints:/workspace/checkpoints:ro
    ports:
      # Motion API (run_motion_api.py) — primary service consumed by woid.
      - "${SERVER_PORT:-7862}:${SERVER_PORT:-7862}"
      # Gradio demo port — kept mapped for `docker exec demo python -m kimodo.demo`.
      - "7860:7860"
      # run_simple_app port — kept mapped for ad-hoc `docker exec` launches.
      - "7861:7861"
    environment:
      # Point the model at the text-encoder service.
      - TEXT_ENCODER_URL=http://text-encoder:9550/
      # Make checkpoint paths robust (Hydra config reads this).
      - SERVER_PORT=${SERVER_PORT:-7862}
      - HF_HOME=/workspace/.cache/huggingface
      # Host user mapping (for non-root ownership + proper shell prompt)
      - HOST_USER=${USER:-user}

      # GPU
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    shm_size: "16gb"
    ipc: host

    depends_on:
      text-encoder:
        condition: service_healthy

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
