<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kimodo Sample</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1a1a1a; color: #eee; font-family: system-ui, sans-serif; }
      #app { position: relative; width: 100%; height: 100vh; }
      canvas { display: block; }
      #panel {
        position: absolute; top: 16px; left: 16px; right: 16px; max-width: 560px;
        background: rgba(20, 20, 20, 0.85); padding: 12px 14px; border-radius: 8px;
        backdrop-filter: blur(6px); display: flex; flex-direction: column; gap: 8px;
      }
      #row1 { display: flex; gap: 8px; align-items: center; }
      #row2 { display: flex; gap: 10px; align-items: center; font-size: 12px; color: #bbb; }
      #row3, #row4 { display: flex; gap: 8px; align-items: center; font-size: 13px; color: #bbb; }
      #character, #saved { display: none; }
      .picker { position: relative; flex: 1; }
      .picker-btn { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; gap: 4px; font-size: 13px; }
      .picker-btn::after { content: '▾'; opacity: 0.6; font-size: 10px; }
      .picker-btn:hover { border-color: #4a90e2; }
      .picker-pop { display: none; position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: rgba(20,20,20,0.97); border: 1px solid #444; border-radius: 6px; padding: 8px; z-index: 100; flex-direction: column; gap: 6px; min-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
      .picker-pop.open { display: flex; }
      .picker-pop input.search { padding: 5px 8px; border-radius: 4px; border: 1px solid #444; background: #111; color: #eee; font-size: 12px; }
      .picker-pop .filter { display: flex; gap: 4px; flex-wrap: wrap; }
      .picker-pop .filter button { padding: 3px 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a1a; color: #aaa; font-size: 11px; cursor: pointer; }
      .picker-pop .filter button.active { background: #4a90e2; color: white; border-color: #4a90e2; }
      .picker-pop .list { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
      .picker-pop .item { padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; color: #ddd; display: flex; justify-content: space-between; align-items: center; gap: 4px; }
      .picker-pop .item:hover { background: #2a2a2a; }
      .picker-pop .item.selected { background: #2a3a4a; }
      .picker-pop .item .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: #333; color: #999; }
      .picker-pop .item .badge.mixamo { background: #5a3a3a; color: #ffc; }
      .picker-pop .item .badge.builtin { background: #3a4a3a; color: #cfc; }
      .picker-pop .item .badge.kimodo { background: #3a3a5a; color: #ccf; }
      .picker-pop .empty { color: #888; font-style: italic; padding: 8px; text-align: center; }
      #delete { padding: 6px 10px; background: #5a3a3a; }
      #delete:hover { background: #7a4a4a; }
      #mixamo-btn { padding: 6px 10px; background: #3a4a5a; }
      #mixamo-btn:hover { background: #4a5a6a; }
      #mixamo-panel { display: none; flex-direction: column; gap: 8px; padding: 8px; background: rgba(0,0,0,0.4); border-radius: 6px; }
      #mixamo-panel.open { display: flex; }
      #mixamo-search { padding: 6px 8px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; }
      #mixamo-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; max-height: 320px; overflow-y: auto; }
      .mx-card { background: #222; border: 1px solid #333; border-radius: 6px; padding: 4px; cursor: pointer; text-align: center; font-size: 11px; }
      .mx-card:hover { border-color: #4a90e2; }
      .mx-card.busy { opacity: 0.5; cursor: wait; }
      .mx-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; background: #111; display: block; }
      .mx-card .name { margin-top: 4px; line-height: 1.2; word-break: break-word; }
      #mixamo-status { font-size: 11px; color: #999; }
      #prompt { flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; font-size: 14px; }
      button { padding: 8px 14px; border-radius: 6px; border: 0; background: #4a90e2; color: white; cursor: pointer; font-size: 14px; }
      button:disabled { background: #555; cursor: wait; }
      #seconds { flex: 1; }
      #status { position: absolute; bottom: 12px; left: 16px; font-size: 12px; color: #999; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="panel">
        <div id="row1">
          <input id="prompt" type="text" placeholder="A person walks forward." value="A person walks forward." />
          <button id="generate">Generate</button>
        </div>
        <div id="row2">
          <label for="seconds">Duration:</label>
          <input id="seconds" type="range" min="0.5" max="5" step="0.5" value="2" />
          <span id="seconds-label">2.0 s</span>
        </div>
        <div id="row3">
          <label for="character">Character:</label>
          <select id="character"></select>
          <div class="picker" id="character-picker">
            <button class="picker-btn" id="character-btn" type="button">SMPL-X (neutral)</button>
            <div class="picker-pop" id="character-pop">
              <input class="search" id="character-search" placeholder="Search characters…" />
              <div class="filter" id="character-filter">
                <button data-source="all" class="active">All</button>
                <button data-source="builtin">Built-in</button>
                <button data-source="mixamo">Mixamo</button>
              </div>
              <div class="list" id="character-list"></div>
            </div>
          </div>
          <button id="mixamo-btn" title="Import a character from Mixamo">+ Mixamo</button>
          <button id="char-delete" title="Remove the selected imported character" style="background: #5a3a3a; padding: 6px 9px;" disabled>✕</button>
          <label for="align" style="margin-left: 8px;">Align:</label>
          <select id="align" title="rest: use bone rest orientation (skinned). frame: full primary+twist alignment. direction: axis only. none: pass-through.">
            <option value="rest">rest</option>
            <option value="frame">frame</option>
            <option value="direction">direction</option>
            <option value="none">none</option>
          </select>
        </div>
        <div id="mixamo-panel">
          <input id="mixamo-search" type="text" placeholder="Search Mixamo characters (e.g. 'robot', 'zombie', 'knight')…" />
          <div id="mixamo-status"></div>
          <div id="mixamo-results"></div>
        </div>
        <div id="row4">
          <label for="saved">Animation:</label>
          <select id="saved">
            <option value="">— select to load —</option>
          </select>
          <div class="picker" id="saved-picker">
            <button class="picker-btn" id="saved-btn" type="button">— pick an animation —</button>
            <div class="picker-pop" id="saved-pop">
              <input class="search" id="saved-search" placeholder="Search animations…" />
              <div class="filter" id="saved-filter">
                <button data-source="all" class="active">All</button>
                <button data-source="kimodo">Kimodo</button>
                <button data-source="mixamo">Mixamo</button>
              </div>
              <div class="list" id="saved-list"></div>
            </div>
          </div>
          <button id="mixamo-anim-btn" title="Import a Mixamo animation" style="background: #3a4a5a; padding: 6px 10px;">+ Mixamo Anim</button>
          <button id="delete" title="Delete the selected animation">✕</button>
          <button id="ragdoll-test" title="Drop a physics capsule (Rapier sanity check)" style="background: #5a4a3a; padding: 6px 10px;">Drop capsule</button>
          <button id="ragdoll" title="Ragdoll the current character (drop under physics)" style="background: #6a4a8a; padding: 6px 10px;">Ragdoll</button>
        </div>
        <div id="row-ragdoll" style="display: flex; gap: 10px; align-items: center; font-size: 11px; color: #aaa; flex-wrap: wrap;">
          <span style="color: #888;">Ragdoll:</span>
          <label><input type="radio" name="rd-impl" value="capsule" checked /> capsule</label>
          <label><input type="radio" name="rd-impl" value="block" /> block</label>
          <span style="color: #555;">|</span>
          <label><input type="checkbox" id="rd-self-collide" checked /> self-collision</label>
          <label><input type="checkbox" id="rd-joint-contacts-off" checked /> joint contacts off</label>
          <label><input type="checkbox" id="rd-damping" checked /> damping</label>
          <label><input type="checkbox" id="rd-hinges" checked /> hinge knees+elbows</label>
          <label data-impl="capsule"><input type="checkbox" id="rd-pelvis-belt" checked /> pelvis-as-hip-belt</label>
          <label data-impl="capsule"><input type="checkbox" id="rd-min-len" checked /> min body length</label>
          <label data-impl="capsule"><input type="checkbox" id="rd-rigid-ext" checked /> rigid extremities</label>
          <label data-impl="capsule"><input type="checkbox" id="rd-rigid-torso" checked /> rigid torso</label>
          <label data-impl="block"><input type="checkbox" id="rd-fixed-head" checked /> fixed head</label>
          <label data-impl="block"><input type="checkbox" id="rd-fixed-handsfeet" checked /> fixed hands+feet</label>
          <label><input type="checkbox" id="rd-debug" /> debug capsules</label>
          <span style="color: #666;">(toggles take effect on next Ragdoll)</span>
        </div>
        <div id="mixamo-anim-panel" class="picker-pop" style="position: static; margin-top: 0;">
          <input class="search" id="mixamo-anim-search" type="text" placeholder="Search Mixamo animations (e.g. 'idle', 'wave', 'dance')…" />
          <div id="mixamo-anim-status" style="font-size: 11px; color: #999;"></div>
          <div id="mixamo-anim-results" class="list"></div>
        </div>
      </div>
      <div id="status">Loading…</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
